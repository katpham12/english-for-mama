<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English for Mama</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f9f8f5;
      --surface:  #ffffff;
      --border:   #e4e2db;
      --text:     #1a1a18;
      --muted:    #6b6963;
      --hint:     #9b9790;
      --blue-bg:  #eef4fd;
      --blue:     #1a5fb4;
      --green-bg: #edf7ed;
      --green:    #1d6b2e;
      --red-bg:   #fdeeed;
      --red:      #b91c1c;
      --orange:   #e85d24;
      --radius:   12px;
      --radius-sm: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    #app { max-width: 560px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

    /* ── Header ── */
    .header { text-align: center; padding: 1.5rem 0 1rem; }
    .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--muted); }
    .streak {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px; margin-top: 10px;
    }

    /* ── Nav ── */
    .nav { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .nav button {
      flex: 1; padding: 10px 4px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; font-size: 12px;
      line-height: 1.4; transition: all .15s; font-family: inherit;
    }
    .nav button .en { font-size: 13px; font-weight: 600; display: block; }
    .nav button .vn { font-size: 11px; opacity: .7; display: block; }
    .nav button.active {
      background: var(--blue-bg); color: var(--blue);
      border-color: #b8d0f0; font-weight: 500;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
    }
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--hint); margin-bottom: 12px;
    }
    .section-label .vn { font-weight: 400; opacity: .8; margin-left: 4px; }

    /* ── Alphabet ── */
    .alpha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 7px; }
    .letter-btn {
      padding: 10px 4px; text-align: center; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      cursor: pointer; font-size: 18px; font-weight: 600;
      transition: all .12s; color: var(--text); font-family: inherit;
    }
    .letter-btn:hover { background: var(--blue-bg); border-color: #b8d0f0; color: var(--blue); }
    .letter-btn.done { background: var(--green-bg); border-color: #a8d8a8; color: var(--green); }

    /* ── Letter detail ── */
    .sound-box {
      background: var(--bg); border-radius: var(--radius); padding: 1.5rem;
      text-align: center; margin-bottom: 1rem;
    }
    .big-letter { font-size: 72px; font-weight: 700; line-height: 1; }
    .sound-hint { font-size: 15px; color: var(--muted); margin-top: 8px; }
    .viet-hint  { font-size: 13px; color: var(--hint); margin-top: 4px; }
    .word-ex    { font-size: 20px; font-weight: 600; margin-top: 12px; }
    .listen-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 9px 18px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 14px; cursor: pointer; color: var(--text);
      font-family: inherit; transition: all .12s;
    }
    .listen-btn:hover { background: var(--bg); }
    .action-row { display: flex; gap: 8px; }
    .action-btn {
      flex: 1; padding: 11px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 13px; cursor: pointer; font-family: inherit;
      color: var(--text); transition: all .12s; text-align: center;
    }
    .action-btn:hover { background: var(--bg); }
    .action-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .action-btn.primary:hover { opacity: .9; }

    /* ── Encourage banner ── */
    .encourage {
      display: none; align-items: center; gap: 12px;
      background: var(--green-bg); border: 1px solid #a8d8a8;
      border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    .encourage.show { display: flex; }
    .enc-icon { font-size: 28px; }
    .enc-msg  { font-size: 14px; font-weight: 600; color: var(--green); }
    .enc-sub  { font-size: 12px; color: var(--green); opacity: .85; margin-top: 2px; }

    /* ── Phrases ── */
    .cat-pill {
      display: inline-block; font-size: 11px; font-weight: 600;
      background: var(--blue-bg); color: var(--blue);
      border-radius: 20px; padding: 3px 10px; margin: 12px 0 8px;
    }
    .phrase-row {
      padding: 11px 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .phrase-row:last-child { border-bottom: none; padding-bottom: 0; }
    .phrase-en   { font-size: 15px; font-weight: 500; }
    .phrase-vn   { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .play-btn {
      flex-shrink: 0; padding: 5px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      font-size: 12px; cursor: pointer; color: var(--muted);
      font-family: inherit; transition: all .12s; white-space: nowrap;
    }
    .play-btn:hover { background: var(--bg); }

    /* ── Quiz ── */
    .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .quiz-meta span { font-size: 12px; color: var(--muted); }
    .score-pill {
      background: var(--blue-bg); color: var(--blue);
      border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600;
    }
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .3s; }
    .progress-lbl { font-size: 11px; color: var(--hint); text-align: center; margin-bottom: 14px; }
    .quiz-q { font-size: 17px; font-weight: 500; text-align: center; line-height: 1.5; margin-bottom: 16px; }
    .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .opt-btn {
      padding: 13px 8px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      cursor: pointer; font-size: 14px; text-align: center;
      transition: all .12s; color: var(--text); font-family: inherit; line-height: 1.4;
    }
    .opt-btn:hover:not(:disabled) { background: var(--blue-bg); border-color: #b8d0f0; color: var(--blue); }
    .opt-btn.correct { background: var(--green-bg); border-color: #a8d8a8; color: var(--green); }
    .opt-btn.wrong   { background: var(--red-bg);   border-color: #f0b8b8; color: var(--red); }
    .opt-btn:disabled { cursor: default; }
    .feedback { text-align: center; font-size: 14px; font-weight: 500; min-height: 20px; margin-top: 14px; }
    .feedback.good { color: var(--green); }
    .feedback.bad  { color: var(--red); }
    .feedback .vn  { font-size: 12px; font-weight: 400; display: block; margin-top: 2px; opacity: .85; }
    .next-btn {
      display: none; width: 100%; margin-top: 12px; padding: 12px;
      border-radius: var(--radius-sm); border: none;
      background: var(--blue); color: #fff;
      font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .next-btn .vn { font-size: 12px; opacity: .85; }
    .next-btn.show { display: block; }

    /* ── Done screen ── */
    .done-screen { text-align: center; padding: 2rem 1rem; }
    .done-icon   { font-size: 56px; }
    .done-score  { font-size: 26px; font-weight: 600; margin: 12px 0 4px; }
    .done-msg    { font-size: 14px; color: var(--muted); }
    .done-msg .vn { display: block; font-size: 13px; margin-top: 4px; }
    .retry-btn {
      margin-top: 16px; padding: 11px 28px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      font-size: 14px; cursor: pointer; font-family: inherit; color: var(--text);
    }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
    .error-box {
      background: var(--red-bg); border: 1px solid #f0b8b8;
      border-radius: var(--radius-sm); padding: 12px 16px;
      font-size: 13px; color: var(--red); margin-bottom: 1rem;
    }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .quiz-grid { grid-template-columns: 1fr; }
      .alpha-grid { grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); }
    }
  </style>
</head>

<div id="app">

  <!-- Header -->

  </div>

    </button>

      <span class="en">Phrases</span><span class="vn">Cụm từ hàng ngày</span>
    </button>
    <button onclick="show('quiz')">
      <span class="en">Quiz</span><span class="vn">Kiểm tra</span>
    </button>
  </div>

  <!-- ── ABC TAB ── -->
  <div id="tab-abc">
    <div class="encourage" id="enc-box">
      <span class="enc-icon">🎉</span>
      <div>
        <div class="enc-msg" id="enc-msg"></div>
        <div class="enc-sub" id="enc-sub"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">Click a letter to learn it <span class="vn">/ Bấm vào chữ để học</span></div>
      <div class="alpha-grid" id="alpha-grid"></div>
    </div>
    <div id="letter-detail" style="display:none">
      <div class="sound-box">
        <div class="big-letter" id="det-letter"></div>
        <div class="sound-hint"  id="det-sound"></div>
        <div class="viet-hint"   id="det-viet"></div>
        <div class="word-ex"     id="det-word"></div>
        <button class="listen-btn" onclick="speak(document.getElementById('det-word').textContent)">
          🔊 Nghe &mdash; Listen
        </button>
      </div>
      <div class="card">
        <div class="action-row">
          <button class="action-btn primary" onclick="markDone(currentLetter)">✓ Learned! / Học xong!</button>
          <button class="action-btn" onclick="document.getElementById('letter-detail').style.display='none'">← Back / Quay lại</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── PHRASES TAB ── -->
  <div id="tab-phrases" style="display:none">
    <div id="phrases-loading" class="loading">Loading phrases… / Đang tải…</div>
    <div id="phrases-error"  class="error-box" style="display:none"></div>
    <div class="card" id="phrases-card" style="display:none">
      <div class="section-label">Daily life phrases <span class="vn">/ Những câu thông dụng hàng ngày</span></div>
      <div id="phrase-list"></div>
    </div>
  </div>

  <!-- ── QUIZ TAB ── -->
  <div id="tab-quiz" style="display:none">
    <div id="quiz-loading" class="loading">Loading quiz… / Đang tải…</div>
    <div id="quiz-error"  class="error-box" style="display:none"></div>
    <div id="quiz-active" style="display:none">
      <div class="quiz-meta">
        <span>Score <span style="opacity:.7;font-size:11px">/ Điểm số</span></span>
        <span class="score-pill" id="quiz-score">0 / 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="quiz-prog" style="width:0%"></div></div>
      <div class="progress-lbl" id="prog-lbl"></div>
      <div class="card">
        <div class="quiz-q" id="quiz-q"></div>
        <div class="quiz-grid" id="quiz-opts"></div>
        <div class="feedback" id="quiz-fb"></div>
        <button class="next-btn" id="next-btn" onclick="nextQ()">
          Next question → <span class="vn">Câu tiếp theo</span>
        </button>
      </div>
    </div>
    <div id="quiz-done" class="done-screen" style="display:none">
      <div class="done-icon">🌟</div>
      <div class="done-score" id="final-score"></div>
      <div class="done-msg"   id="final-msg"></div>
      <button class="retry-btn" onclick="startQuiz()">Try again ↺ / Thử lại</button>
    </div>
  </div>

</div>

  {l:'V',sound:'bite lip, voice on',            viet:'giống "v" trong "vui"',                      word:'Very good'},
  {l:'W',sound:'make lips round',               viet:'không có trong tiếng Việt — môi tròn',       word:'Water'},
  {l:'X',sound:'like "ks" or "z"',              viet:'giống "ks" ghép lại',                        word:'X-ray'},
  {l:'Y',sound:'like "yuh"',                    viet:'giống "y" trong "yêu"',                      word:'Yes'},
  {l:'Z',sound:'like a bee — "zzzz"',           viet:'không có trong tiếng Việt',                  word:'Zoo'},
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let done        = JSON.parse(localStorage.getItem('mama_done') || '[]');
let streak      = parseInt(localStorage.getItem('mama_streak') || '0');
let lastDay     = localStorage.getItem('mama_lastday') || '';
let currentLetter = '';
let quizData    = [];
let qIdx = 0, score = 0, answered = false;

// ─────────────────────────────────────────────
// STREAK
// ─────────────────────────────────────────────
function initStreak() {
  const today = new Date().toDateString();
  if (lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    streak = (lastDay === yesterday) ? streak + 1 : 1;
    localStorage.setItem('mama_streak', streak);
    localStorage.setItem('mama_lastday', today);
  }
  const el = document.getElementById('streak-text');
  el.innerHTML = streak > 1
    ? `<strong>${streak}</strong> ngày liên tiếp — ${streak}-day streak! Cô giỏi lắm! 🌸`
    : 'Hôm nay bắt đầu học nhé! — Start learning today!';
}

// ─────────────────────────────────────────────
// ALPHABET
// ─────────────────────────────────────────────
function buildAlphabet() {
  const grid = document.getElementById('alpha-grid');
  grid.innerHTML = '';
  LETTERS.forEach(({l}) => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn' + (done.includes(l) ? ' done' : '');
    btn.textContent = l;
    btn.onclick = () => showLetter(l);
    grid.appendChild(btn);
  });
  updateEncourage();
}

function updateEncourage() {
  const box = document.getElementById('enc-box');
  if (done.length === 0) { box.classList.remove('show'); return; }
  box.classList.add('show');
  const pct = Math.round(done.length / 26 * 100);
  const msgs = [
    'Great start! / Bắt đầu thật tốt!',
    'Keep going! / Tiếp tục nào!',
    'Almost halfway! / Gần một nửa rồi!',
    'More than half! / Hơn một nửa rồi!',
    'Almost done! / Gần xong rồi!',
    'All 26 letters! / Cô học hết 26 chữ cái rồi! 🎉',
  ];
  const idx = done.length === 26 ? 5 : Math.min(Math.floor(pct / 20), 4);
  document.getElementById('enc-msg').textContent = msgs[idx];
  document.getElementById('enc-sub').textContent = `${done.length} / 26 chữ cái — ${pct}% complete`;
}

function showLetter(l) {
  const d = LETTERS.find(x => x.l === l);
  currentLetter = l;
  document.getElementById('det-letter').textContent = l + ' / ' + l.toLowerCase();
  document.getElementById('det-sound').textContent  = d.sound;
  document.getElementById('det-viet').textContent   = d.viet;
  document.getElementById('det-word').textContent   = d.word;
  const detail = document.getElementById('letter-detail');
  detail.style.display = 'block';
  detail.scrollIntoView({ behavior: 'smooth' });
}

function markDone(l) {
  if (!done.includes(l)) {
    done.push(l);
    localStorage.setItem('mama_done', JSON.stringify(done));
  }
  buildAlphabet();
  document.getElementById('letter-detail').style.display = 'none';
}

// ─────────────────────────────────────────────
// PHRASES — load from Notion or fallback
// ─────────────────────────────────────────────
async function loadPhrases() {
  const loadEl  = document.getElementById('phrases-loading');
  const errEl   = document.getElementById('phrases-error');
  const cardEl  = document.getElementById('phrases-card');

  let rows = [];
  if (NOTION_PHRASES_DB !== 'YOUR_PHRASES_DATABASE_ID') {
    try {
      rows = await queryNotion(NOTION_PHRASES_DB);
    } catch(e) {
      errEl.textContent = 'Could not load from Notion — showing default phrases. / Không tải được từ Notion — hiển thị dữ liệu mặc định.';
      errEl.style.display = 'block';
      rows = FALLBACK_PHRASES;
    }
  } else {
    rows = FALLBACK_PHRASES;
  }

  loadEl.style.display = 'none';
  cardEl.style.display = 'block';
  renderPhrases(rows);
}

function renderPhrases(rows) {
  const list = document.getElementById('phrase-list');
  list.innerHTML = '';
  // group by category
  const cats = [...new Set(rows.map(r => r.category))];
  cats.forEach(cat => {
    const pill = document.createElement('div');
    pill.className = 'cat-pill';
    pill.textContent = cat;
    list.appendChild(pill);
    rows.filter(r => r.category === cat).forEach(p => {
      const row = document.createElement('div');
      row.className = 'phrase-row';
      const safe = (p.english || '').replace(/'/g, "\\'");
      row.innerHTML = `
        <div style="flex:1">
          <div class="phrase-en">${p.english || ''}</div>
          <div class="phrase-vn">${p.vietnamese || ''}</div>
        </div>
        <button class="play-btn" onclick="speak('${safe}')">🔊 Nghe</button>
      `;
      list.appendChild(row);
    });
  });
}

// ─────────────────────────────────────────────
// QUIZ — load from Notion or fallback
// ─────────────────────────────────────────────
async function loadQuiz() {
  const loadEl = document.getElementById('quiz-loading');
  const errEl  = document.getElementById('quiz-error');

  let rows = [];
  if (NOTION_QUIZ_DB !== 'YOUR_QUIZ_DATABASE_ID') {
    try {
      rows = await queryNotion(NOTION_QUIZ_DB);
    } catch(e) {
      errEl.textContent = 'Could not load quiz from Notion — using default questions. / Không tải được — dùng câu hỏi mặc định.';
      errEl.style.display = 'block';
      rows = FALLBACK_QUIZ;
    }
  } else {
    rows = FALLBACK_QUIZ;
  }

  loadEl.style.display = 'none';
  quizData = rows.map(r => ({
    q:    r.question,
    opts: [r.optionA, r.optionB, r.optionC, r.optionD],
    a:    ['A','B','C','D'].indexOf((r.answer || 'A').toUpperCase()),
  }));
  startQuiz();
}

// ─────────────────────────────────────────────
// QUIZ LOGIC
// ─────────────────────────────────────────────
function startQuiz() {
  qIdx = 0; score = 0; answered = false;
  document.getElementById('quiz-active').style.display = 'block';
  document.getElementById('quiz-done').style.display   = 'none';
  loadQ();
}

function loadQ() {
  if (qIdx >= quizData.length) { showDone(); return; }
  answered = false;
  const q = quizData[qIdx];
  document.getElementById('quiz-q').textContent    = q.q;
  document.getElementById('quiz-fb').textContent   = '';
  document.getElementById('quiz-fb').className     = 'feedback';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('quiz-prog').style.width = (qIdx / quizData.length * 100) + '%';
  document.getElementById('quiz-score').textContent = score + ' / ' + qIdx;
  document.getElementById('prog-lbl').textContent  =
    `Question ${qIdx + 1} of ${quizData.length} / Câu ${qIdx + 1} trong ${quizData.length}`;
  const grid = document.getElementById('quiz-opts');
  grid.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o;
    btn.onclick = () => answer(i, btn);
    grid.appendChild(btn);
  });
}

function answer(i, btn) {
  if (answered) return;
  answered = true;
  const q = quizData[qIdx];
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.querySelectorAll('.opt-btn')[q.a].classList.add('correct');
  const fb = document.getElementById('quiz-fb');
  if (i === q.a) {
    score++;
    btn.classList.add('correct');
    const good = [
      'Đúng rồi! Correct! 🎉',
      'Giỏi lắm! Well done! 🌟',
      'Tuyệt vời! Excellent! 👏',
      'Cô làm tốt lắm! Great job! 🌸',
    ];
    fb.innerHTML = good[Math.floor(Math.random() * good.length)];
    fb.className = 'feedback good';
    speak(q.opts[q.a]);
  } else {
    fb.innerHTML = 'Không đúng — Not this time, keep going! 💪';
    fb.className = 'feedback bad';
  }
  document.getElementById('next-btn').classList.add('show');
}

function nextQ() { qIdx++; loadQ(); }

function showDone() {
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-done').style.display   = 'block';
  document.getElementById('final-score').textContent   = score + ' / ' + quizData.length + ' correct';
  const pct = Math.round(score / quizData.length * 100);
  let en, vn;
  if (pct >= 80) { en = 'Amazing, Mama!';   vn = 'Cô xuất sắc lắm! Con tự hào về cô! 🥰'; }
  else if (pct >= 50) { en = 'Good job!';   vn = 'Cô làm tốt lắm! Tiếp tục luyện tập nhé! 💪'; }
  else                { en = 'Keep going!'; vn = 'Không sao, cô thử lại nha! Lần sau sẽ tốt hơn! 🌸'; }
  document.getElementById('final-msg').innerHTML = `${en} <span class="vn">${vn}</span>`;
  if (score >= quizData.length / 2) speak('Congratulations! Great job Mama!');
}

// ─────────────────────────────────────────────
// SPEECH
// ─────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
let phrasesLoaded = false;
let quizLoaded    = false;

function show(tab) {
  ['abc','phrases','quiz'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav button').forEach((b, i) => {
    b.classList.toggle('active', ['abc','phrases','quiz'][i] === tab);
  });
  if (tab === 'phrases' && !phrasesLoaded) { phrasesLoaded = true; loadPhrases(); }
  if (tab === 'quiz'    && !quizLoaded)    { quizLoaded    = true; loadQuiz(); }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
initStreak();
buildAlphabet();
</script>
</body>
</html>
